<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Calendário Maia • Kin do Dia</title>
<style>
    body {
        background: #0b0b0b;
        color: #f2f2f2;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        padding: 40px;
    }
    .box {
        max-width: 480px;
        width: 100%;
        background: #141414;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 0 20px rgba(255,255,255,0.05);
    }
    h1 {
        text-align: center;
        margin-bottom: 20px;
    }
    label {
        display: block;
        margin-top: 15px;
        font-weight: bold;
    }
    input, button {
        width: 100%;
        padding: 10px;
        margin-top: 8px;
        border-radius: 6px;
        border: none;
        font-size: 16px;
    }
    button {
        background: #e53935;
        color: white;
        cursor: pointer;
        margin-top: 20px;
    }
    button:hover {
        background: #ff5252;
    }
    .result {
        margin-top: 25px;
        background: #1f1f1f;
        padding: 15px;
        border-radius: 8px;
    }
    .result p {
        margin: 6px 0;
    }
</style>
</head>

<body>
<div class="box">
    <h1>🌀 Kin do Dia</h1>

    <label>Data de nascimento</label>
    <input type="date" id="birth">

    <button onclick="calcularKin()">Calcular</button>

    <div class="result" id="resultado"></div>
</div>

<script>
const BASE_DATE = new Date("1987-07-26"); // Kin 1

function calcularKin() {
    const birthInput = document.getElementById("birth").value;
    if (!birthInput) return;

    const birthDate = new Date(birthInput);
    const today = new Date();

    const kinNatal = calcularKinPorData(birthDate);
    const kinHoje = calcularKinPorData(today);

    let kinPessoalDia = kinNatal + kinHoje;
    if (kinPessoalDia > 260) kinPessoalDia -= 260;

    const oraculo = gerarOraculo(kinPessoalDia);

    document.getElementById("resultado").innerHTML = `
        <p><strong>Kin de nascimento:</strong> ${kinNatal}</p>
        <p><strong>Kin do dia (Tzolkin):</strong> ${kinHoje}</p>
        <p><strong>Kin pessoal do dia:</strong> ${kinPessoalDia}</p>
        <hr>
        <p><strong>🧭 Oráculo do Dia</strong></p>
        <p><strong>Destino:</strong> Kin ${oraculo.destino}</p>
        <p><strong>Análogo (Amigo):</strong> Kin ${oraculo.analogo}</p>
        <p><strong>Antípoda (Desafio):</strong> Kin ${oraculo.antipoda}</p>
        <p><strong>Oculto (Fator Surpresa):</strong> Kin ${oraculo.oculto}</p>
    `;
}

function calcularKinPorData(data) {
    const diffDays = Math.floor((data - BASE_DATE) / (1000 * 60 * 60 * 24));
    let kin = (diffDays % 260) + 1;
    if (kin <= 0) kin += 260;
    return kin;
}

function gerarOraculo(kin) {
    const analogo = kin <= 130 ? kin + 130 : kin - 130;
    const antipoda = kin <= 130 ? kin + 130 : kin - 130;
    const oculto = 261 - kin;

    return {
        destino: kin,
        analogo,
        antipoda,
        oculto
    };
}
</script>
</body>
</html>
